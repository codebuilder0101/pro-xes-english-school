name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cd /var/www/pro-xes-english-study
            git fetch --all
            git reset --hard origin/main
            cd server
            npm ci --no-audit --no-fund
            npm run build
            cd ../client
            npm ci --no-audit --no-fund
            npm run build
            pm2 restart pro-xes-server --update-env
            pm2 save
